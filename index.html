<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chetan Joshi | ThroneLeaf Games</title>
    <style>
        /* 1. Global Setup - Using Inter font for professional look */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            overflow: hidden; /* No scroll for this section */
        }

        /* 2. Primary Background with your Image - Fix for Cj.png */
        .primary-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black; /* Backup */
            z-index: 1;
        }
        
        .primary-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center; /* Focus on face/shoulders */
            opacity: 0; /* Start hidden for animation */
            animation: imageFadeIn 2s ease forwards;
            filter: brightness(0.6) contrast(1.1); /* To make text pop */
        }

        /* 3. Animations Definitions */
        @keyframes imageFadeIn {
            to { opacity: 0.7; } /* Set final brightness */
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Pulser glow for the teal button */
        @keyframes tealGlow {
            0% { box-shadow: 0 0 5px rgba(69, 138, 125, 0.4); }
            50% { box-shadow: 0 0 20px rgba(69, 138, 125, 0.9); }
            100% { box-shadow: 0 0 5px rgba(69, 138, 125, 0.4); }
        }

        /* 4. Content Area (Left/Center) */
        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%; /* Place text on the left */
            padding-right: 25%; /* Space for icons */
            max-width: 1600px;
        }

        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #4db8ff; /* Light blue accent */
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.7s forwards;
        }

        p {
            max-width: 550px;
            font-size: 1.15rem;
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1s ease 0.9s forwards;
        }

        /* Buttons (Glass Effect) */
        .btn-group {
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            margin: 10px 15px 10px 0;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Teal button with dynamic glow animation */
        .btn-primary {
            background: rgba(69, 138, 125, 0.85);
            color: white;
            animation: tealGlow 2s infinite ease-in-out;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: white;
            backdrop-filter: blur(8px);
        }

        .btn:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* 5. Social Bar (Right Side, matching Carrd style) */
        .social-bar {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            animation: fadeInRight 1s ease 1.5s forwards;
        }

        .social-icon {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
            overflow: hidden;
        }

        .social-icon:hover {
            transform: scale(1.2) rotate(10deg);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        /* Tooltip text for icons */
        .social-icon::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 70px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
        }
        
        .social-icon:hover::after {
            opacity: 1;
            right: 80px;
        }

        /* Simple SVG Icons (Instead of external libraries) */
        .icon-svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

    </style>
