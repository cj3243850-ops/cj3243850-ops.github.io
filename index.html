<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chetan Joshi | ThroneLeaf Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #000; 
            color: white; 
            overflow: hidden; 
        }

        /* FIXED BACKGROUND: Using CJ.png (Both Caps) */
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Linear gradient for that dark red moody look */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)), 
                        url('CJ.png') no-repeat center center/cover;
            z-index: 1;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            max-width: 800px;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #4db8ff;
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: fadeInUp 1s ease forwards;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease 0.2s forwards;
            opacity: 0;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.4s forwards;
            opacity: 0;
        }

        /* Glass Buttons */
        .btn-container {
            display: flex;
            gap: 20px;
            animation: fadeInUp 1s ease 0.6s forwards;
            opacity: 0;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-teal {
            background: rgba(69, 138, 125, 0.8);
            color: white;
            box-shadow: 0 0 20px rgba(69, 138, 125, 0.3);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Right Social Icons */
        .social-sidebar {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .s-link {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .s-link:hover {
            background: #fff;
            transform: scale(1.1);
        }

        .s-link svg { width: 22px; height: 22px; fill: white; transition: 0.3s; }
        .s-link:hover svg { fill: #000; }

    </style>
</head>
