<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chetan Joshi | Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Background Image Setup */
        .bg-image {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('Cj.png');
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .content {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .subtitle {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #3498db;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        /* Buttons like the screenshot */
        .btn-container {
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px 35px;
            border-radius: 8px;
            font-weight: bold;
            margin: 0 10px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-select {
            background-color: #458a7d; /* Teal color from your image */
        }

        .btn-demo {
            border: 1px solid white;
            background: transparent;
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="content">
            <div class="subtitle">Indie Game Developer</div>
            <h1>Chetan Joshi</h1>
            <p>Founder of ThroneLeaf Games. Crafting immersive parkour experiences and stylized 3D art in Unity & Blender.</p>
            
            <div class="btn-container">
                <a href="#" class="btn btn-select">My Games</a>
                <a href="#" class="btn btn-demo">3D Art</a>
            </div>
        </div>
    </div>

</body>
</html>
